<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mamá</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Share+Tech+Mono&display=swap');

        :root {
            --color-caja: #d63031;
            --color-tapa: #ff4757;
            --color-lazo: #f1c40f;
        }

        body {
            margin: 0;
            background-color: #080808;
            color: white;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- Pantalla 1: Regalo 3D --- */
        #pantalla1 { 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Contenedor de perspectiva para el 3D */
        .regalo-container {
            width: 200px;
            height: 200px;
            perspective: 1000px;
            cursor: pointer;
            position: relative;
            margin-bottom: 50px;
        }

        /* La caja en sí */
        .caja-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(30deg);
            transition: transform 0.5s ease;
        }

        .regalo-container:hover .caja-3d {
            transform: rotateX(-20deg) rotateY(50deg);
        }

        /* Caras de la caja */
        .cara {
            position: absolute;
            width: 200px;
            height: 200px;
            background: var(--color-caja);
            border: 2px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Lazo en las caras */
        .cara::before {
            content: '';
            position: absolute;
            background: var(--color-lazo);
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        /* Vertical ribbon */
        .cara.frente::before, .cara.atras::before, .cara.izquierda::before, .cara.derecha::before {
            width: 40px;
            height: 100%;
        }

        .frente     { transform: translateZ(100px); }
        .atras      { transform: rotateY(180deg) translateZ(100px); }
        .izquierda  { transform: rotateY(-90deg) translateZ(100px); }
        .derecha    { transform: rotateY(90deg) translateZ(100px); }
        .abajo      { transform: rotateX(-90deg) translateZ(100px); background: #a52627; }

        /* La Tapa */
        .tapa-3d {
            position: absolute;
            width: 220px;
            height: 40px;
            background: var(--color-tapa);
            transform-style: preserve-3d;
            top: -20px;
            left: -10px;
            transform: translateZ(110px); /* Ajuste para que cubra */
            transition: transform 0.8s ease, opacity 0.5s;
        }

        /* Cinta sobre la tapa */
        .tapa-top {
            position: absolute;
            width: 220px;
            height: 220px;
            background: var(--color-tapa);
            transform: rotateX(90deg) translateZ(20px);
            top: -110px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tapa-top::before, .tapa-top::after {
            content: '';
            position: absolute;
            background: var(--color-lazo);
        }
        .tapa-top::before { width: 45px; height: 100%; }
        .tapa-top::after  { width: 100%; height: 45px; }

        /* Animación de temblor */
        .tiembla {
            animation: shake 0.2s infinite;
        }

        @keyframes shake {
            0% { transform: rotateX(-20deg) rotateY(30deg) translate(2px, 0); }
            50% { transform: rotateX(-20deg) rotateY(30deg) translate(-2px, 0); }
            100% { transform: rotateX(-20deg) rotateY(30deg) translate(2px, 0); }
        }

        .no-tocar {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            color: #fff;
            text-shadow: 0 0 10px #ff4757;
            margin-top: 20px;
        }

        #contador {
            font-family: 'Montserrat', sans-serif;
            font-size: 100px;
            color: var(--color-lazo);
            font-weight: 900;
            margin-top: 10px;
        }

        /* --- Pantalla 2: Revelación --- */
        #pantalla2 {
            display: none;
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        .foto-espacio {
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
            border: 8px solid #fff;
            background: #1a1a1a;
            transform: rotate(-3deg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .foto-espacio img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Esto hace que la foto se vea bien */
        }

        #mensaje {
            font-size: 22px;
            line-height: 1.5;
            color: #00ffcc;
            text-transform: uppercase;
            min-height: 3em;
        }

        .cursor {
            background: #00ffcc;
            display: inline-block;
            width: 12px;
            height: 24px;
            margin-left: 5px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

    </style>
</head>
<body>

    <div id="pantalla1">
        <div class="regalo-container" id="regalo" onclick="triggerSecuencia()">
            <div class="caja-3d" id="caja">
                <div class="cara frente"></div>
                <div class="cara atras"></div>
                <div class="cara izquierda"></div>
                <div class="cara derecha"></div>
                <div class="cara abajo"></div>
                
                <div class="tapa-3d" id="tapa">
                    <div class="tapa-top"></div>
                </div>
            </div>
        </div>
        <h2 class="no-tocar" id="textoGuia">TÓCAME</h2>
        <div id="contador"></div>
    </div>

    <div id="pantalla2">
        <div class="foto-espacio">
            <img src="IMG_20260124_102902.jpg" alt="Foto Mamá">
        </div>
        <div id="mensaje"></div><span class="cursor"></span>
    </div>

    <script>
        const mensajeFinal = "¡Feliz día, mamá! Gracias por ser mi guía, mi apoyo y mi mejor ejemplo. Te quiero muchísimo.";

        function triggerSecuencia() {
            const caja = document.getElementById('caja');
            const tapa = document.getElementById('tapa');
            const contador = document.getElementById('contador');
            const guia = document.getElementById('textoGuia');

            // Animación inicial
            caja.classList.add('tiembla');
            guia.style.display = 'none';
            
            let num = 3;
            contador.innerText = num;

            let timer = setInterval(() => {
                num--;
                if (num > 0) {
                    contador.innerText = num;
                } else {
                    clearInterval(timer);
                    
                    // Efecto de volar la tapa
                    tapa.style.transform = "translateY(-500px) rotateX(90deg) scale(0)";
                    tapa.style.opacity = "0";
                    
                    setTimeout(revelar, 600);
                }
            }, 1000);
        }

        function revelar() {
            document.getElementById('pantalla1').style.display = 'none';
            document.getElementById('pantalla2').style.display = 'block';

            // Confetti infinito por 4 segundos
            var end = Date.now() + (4 * 1000);
            var colors = ['#00ffcc', '#f1c40f', '#ff4757'];

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            typeWriter(0);
        }

        function typeWriter(i) {
            if (i < mensajeFinal.length) {
                document.getElementById('mensaje').innerHTML += mensajeFinal.charAt(i);
                setTimeout(() => typeWriter(i + 1), 50);
            }
        }
    </script>
</body>
</html>
