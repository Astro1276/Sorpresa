<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobo Weaver Pro | Elite Edition</title>
    
    <link rel="stylesheet" href="styles.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ext-language_tools.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Lobo Panel 🐺</h2>
            <button id="closeMenu">✕</button>
        </div>

        <div class="sidebar-actions">
            <button class="btn" id="btnToggleTheme">🌞/🌙 Modo Claro/Oscuro</button>
        </div>

        <div class="menu-section">
            <button class="menu-header" data-target="menu-auth">👤 CUENTA / LOGIN <span>▼</span></button>
            <div id="menu-auth" class="menu-content">
                <div id="user-info"></div>
                <button class="btn btn-google" id="btnGoogle">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google Login
                </button>
                <div id="email-form" class="auth-box">
                    <input type="email" id="email" placeholder="Tu Email">
                    <input type="password" id="password" placeholder="Tu Clave">
                    <button class="btn btn-accent" id="btnLogin">Entrar / Registrar</button>
                </div>
                <button id="btnLogout" class="btn btn-reset">Cerrar Sesión</button>
            </div>
        </div>
        
        <div class="menu-section">
            <button class="menu-header" data-target="menu-files-html">🟧 Archivos HTML <span>▼</span></button>
            <div id="menu-files-html" class="menu-content">
                <ul id="filelist-html" class="file-list"></ul>
                <button class="btn-file-add" data-type="html">+ Nuevo HTML</button>
            </div>
        </div>
        
        <div class="menu-section">
            <button class="menu-header" data-target="menu-files-css">🟦 Archivos CSS <span>▼</span></button>
            <div id="menu-files-css" class="menu-content">
                <ul id="filelist-css" class="file-list"></ul>
                <button class="btn-file-add" data-type="css">+ Nuevo CSS</button>
            </div>
        </div>
    
        <div class="menu-section">
            <button class="menu-header" data-target="menu-files-js">🟨 Archivos JS <span>▼</span></button>
            <div id="menu-files-js" class="menu-content">
                <ul id="filelist-js" class="file-list"></ul>
                <button class="btn-file-add" data-type="js">+ Nuevo JS</button>
            </div>
        </div>

        <div class="menu-section">
            <button class="menu-header" data-target="menu-copy">📋 COPIAR CÓDIGO <span>▼</span></button>
            <div id="menu-copy" class="menu-content">
                <button class="btn btn-copy" data-lang="html">Copiar HTML</button>
                <button class="btn btn-copy" data-lang="css">Copiar CSS</button>
                <button class="btn btn-copy" data-lang="js">Copiar JS</button>
                <button class="btn btn-copy" data-lang="py">Copiar Python 🐍</button>
                <button class="btn btn-all" id="copyFullProject">Copiar Proyecto Completo</button>
            </div>
        </div>
        
        <div class="menu-section">
            <button class="menu-header" data-target="menu-zip">💾 EXPORTAR <span>▼</span></button>
            <div id="menu-zip" class="menu-content">
                <button class="btn btn-save-green" id="btnZip">Descargar ZIP</button>
            </div>
        </div>
        
        <div class="menu-section">
            <button class="menu-header" data-target="menu-actions">⚙️ ACCIONES <span>▼</span></button>
            <div id="menu-actions" class="menu-content">
                <button class="btn btn-save" id="btnSave">GUARDAR EN NUBE ☁️</button>
                <button class="btn" id="btnDictionary">DICCIONARIO 🤨</button>
            </div>
        </div>
    </aside>

    <header>
        <div class="header-left">
            <button class="menu-btn" id="openMenu">☰</button>
            <h1 class="logo">LOBO WEAVER PRO</h1>
            <div class="tab-system">
                <button class="tab-btn active" id="tabWeb">WEB</button>
                <button class="tab-btn" id="tabPy">PYTHON 🐍</button>
            </div>
        </div>
        <div class="header-right">
            <div id="status-cloud">● Local</div>
            <button class="btn-thanos" id="thanosSnap">DESTRUIR TODO 🫰</button>
        </div>
    </header>

    <main class="main-workspace" id="main-content">
        <div id="web-env" class="workspace-env">
            <div class="code-panels">
                <div class="panel active" id="panel-html">
                    <div class="panel-header" data-panel="html">HTML</div>
                    <div id="html-editor" class="editor-container"></div>
                </div>
                <div class="panel" id="panel-css">
                    <div class="panel-header" data-panel="css">CSS</div>
                    <div id="css-editor" class="editor-container"></div>
                </div>
                <div class="panel" id="panel-js">
                    <div class="panel-header" data-panel="js">JS</div>
                    <div id="js-editor" class="editor-container"></div>
                </div>
            </div>
            
            <div class="responsive-bar">
                <button class="res-btn active" data-size="desktop">🖥️</button>
                <button class="res-btn" data-size="tablet">📲</button>
                <button class="res-btn" data-size="mobile">📱</button>
            </div>

            <div class="preview-panel">
                <iframe id="output"></iframe>
                <div id="err-js-preview"></div>
            </div>
        </div>

        <div id="py-env" class="workspace-env hidden">
            <div class="python-workspace">
                <div class="editor-box">
                    <div class="panel-header">PYTHON SCRIPT</div>
                    <div id="py-editor" class="editor-container"></div>
                </div>
                <div class="console-box">
                    <div class="panel-header">OUTPUT</div>
                    <div id="py-output" class="py-console"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
