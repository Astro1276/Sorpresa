<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Guesguan</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Share+Tech+Mono&display=swap');

        body {
            margin: 0;
            background-color: #080808;
            color: white;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- Pantalla 1: Regalo 3D --- */
        #pantalla1 { text-align: center; }

        .regalo-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto;
            cursor: pointer;
            perspective: 600px;
        }

        .caja-3d {
            width: 100%;
            height: 100%;
            background: #d63031;
            position: relative;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* Lazo del regalo */
        .caja-3d::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 100%;
            background: #f1c40f;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .caja-3d::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 30px;
            background: #f1c40f;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        /* Tapa del regalo */
        .tapa {
            position: absolute;
            top: -15px;
            left: -5px;
            width: 160px;
            height: 40px;
            background: #ff4757;
            border-radius: 4px;
            z-index: 2;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        .no-tocar {
            margin-top: 40px;
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ff4757;
        }

        /* Animación de temblor */
        .tiembla { animation: shake 0.1s infinite cubic-bezier(.36,.07,.19,.97); }

        @keyframes shake {
            0% { transform: translate(3px, 0) rotate(1deg); }
            50% { transform: translate(-3px, 0) rotate(-1deg); }
            100% { transform: translate(3px, 0) rotate(1deg); }
        }

        #contador {
            font-family: 'Montserrat', sans-serif;
            font-size: 130px;
            color: #f1c40f;
            height: 150px;
            font-weight: 900;
        }

        /* --- Pantalla 2: El mensaje --- */
        #pantalla2 {
            display: none;
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        .foto-espacio {
            width: 280px;
            height: 280px;
            margin: 0 auto 30px;
            border: 6px solid #fff;
            background: #1a1a1a;
            position: relative;
            transform: rotate(-3deg);
            overflow: hidden;
        }

        .foto-espacio img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #mensaje {
            font-size: 22px;
            line-height: 1.5;
            color: #00ffcc;
            text-transform: uppercase;
        }

        .cursor {
            background: #00ffcc;
            display: inline-block;
            width: 12px;
            height: 24px;
            margin-left: 5px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="pantalla1">
        <div class="regalo-container" id="regalo" onclick="triggerSecuencia()">
            <div class="tapa"></div>
            <div class="caja-3d"></div>
        </div>
        <h2 class="no-tocar" id="textoGuia">NO TOCAR</h2>
        <div id="contador"></div>
    </div>

    <div id="pantalla2">
        <div class="foto-espacio">
            <img src="TU_FOTO_AQUI.jpg" alt="Guesguan">
        </div>
        <div id="mensaje"></div><span class="cursor"></span>
    </div>

    <script>
        const mensajeFinal = "¡GUESGUAN! 🔥 Un año más en el juego. Hoy se celebra fuerte, que sigan llegando los éxitos y que el nivel nunca baje. ¡Feliz cumple, fiera! 👊💥";

        function triggerSecuencia() {
            const regalo = document.getElementById('regalo');
            const contador = document.getElementById('contador');
            const guia = document.getElementById('textoGuia');

            regalo.classList.add('tiembla');
            guia.style.display = 'none';
            
            let num = 3;
            contador.innerText = num;

            let timer = setInterval(() => {
                num--;
                if (num > 0) {
                    contador.innerText = num;
                } else {
                    clearInterval(timer);
                    revelar();
                }
            }, 1000);
        }

        function revelar() {
            document.getElementById('pantalla1').style.display = 'none';
            document.getElementById('pantalla2').style.display = 'block';

            // Explosión Pro de Confeti
            var end = Date.now() + (4 * 1000);
            var colors = ['#00ffcc', '#f1c40f', '#ff4757'];

            (function frame() {
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            typeWriter(0);
        }

        function typeWriter(i) {
            if (i < mensajeFinal.length) {
                document.getElementById('mensaje').innerHTML += mensajeFinal.charAt(i);
                setTimeout(() => typeWriter(i + 1), 40);
            }
        }
    </script>
</body>
</html>
